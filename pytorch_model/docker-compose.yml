services:
  app:
    build: .
    container_name: pytorch-ttt-service
    environment:
      - DEVICE=cuda
      - CHECKPOINT_PATH=/models/model.pt
      - TOKENIZER_NAME=meta-llama/Meta-Llama-3-8B
      - MAX_CONTEXT_TOKENS=4096
      - PORT=8000
      - HF_TOKEN=
    volumes:
      - ${CKPT_HOST_PATH:?set CKPT_HOST_PATH}:/models/model.pt:ro
    ports:
      - "8000:8000"
    command: uvicorn inference_service:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  prometheus-metrics:
    image: prom/prometheus:latest
    container_name: prometheus-metrics
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana-py:
    image: grafana/grafana-oss:latest
    container_name: grafana-py
    ports:
      - "4345:3000"
    depends_on:
      - prometheus-metrics
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
